<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Mode Selection -->

    <div id="mode-screen">

        <h1>Tic Tac Toe </h1>

        <p>Select Game Mode</p>

        <div class="mode-buttons">

            <button id="single-btn">
                🤖 Single Player
            </button>

            <button id="double-btn">
                👥 Double Player
            </button>

        </div>

    </div>

    <!-- Winner Message -->

    <div class="msg-container hide">

        <div class="popup">

            <div id="msg"></div>

            <button id="new-btn">
                Play Again
            </button>

            <div class="credit">

                <hr>

                <h3>Developed by Ali</h3>

                <p>HTML • CSS • JavaScript</p>

            </div>

        </div>

    </div>

    <!-- Game Screen -->

    <main id="game-screen" class="hide">

        <h1>Tic Tac Toe</h1>

        <!-- Turn -->

        <h2 id="turn">
            Player X Turn
        </h2>

        <!-- Scoreboard -->

        <div class="scoreboard">

            <div>
                ❌ X :
                <span id="score-x">0</span>
            </div>

            <div>
                ⭕ O :
                <span id="score-o">0</span>
            </div>

            <div>
                🤝 Draw :
                <span id="score-draw">0</span>
            </div>

        </div>

        <!-- Game -->

        <div class="container">

            <div class="game">

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

            </div>

        </div>

        <div class="buttons">

            <button id="reset-btn">
                Reset
            </button>

            <button id="home-btn">
                Home
            </button>

        </div>

    </main>

    <script src="game.js"></script>

</body>

</html>
